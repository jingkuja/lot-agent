# ─────────────────────────────────────────────────────────────
# Lot Agent — single-host deployment (first version).
#
# Services:
#   postgres  business data (named volume pg_data)
#   redis     BullMQ queue / gen-cache / progress pub-sub (requirepass)
#   server    Hono HTTP API            (Node image, ROLE=server)
#   worker    BullMQ job consumer       (same Node image, ROLE=worker)
#   web       nginx: serves web/dist + reverse-proxies /api and /static
#
# server & worker share the SAME built image (lot-agent-app) and the SAME
# `app_data` volume — the worker writes generated assets, the server serves
# them at /static, so they MUST see the same files.
#
# Secrets come from `.env` (copy from deploy/.env.example). Nothing secret is
# hard-coded here.
# ─────────────────────────────────────────────────────────────

# Shared app environment for server & worker (YAML anchor, merged per service).
x-app-env: &app-env
  NODE_ENV: production
  PG_HOST: postgres
  PG_PORT: "5432"
  PG_USER: ${PG_USER:-postgres}
  PG_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
  PG_DATABASE: ${PG_DATABASE:-lot}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
  LLM_DEFAULT: ${LLM_DEFAULT:-openai}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com}
  OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-v4-flash}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
  DEBUG_LLM: ${DEBUG_LLM:-}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ${PG_DATABASE:-lot}
      TZ: UTC
      PGTZ: UTC
    command: ["postgres", "-c", "timezone=UTC"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Runs only on first init of an empty data volume.
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-lot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  server:
    # Image built separately from `Dockerfile` (see docs/deployment.md):
    #   docker build -t lot-agent-app:1.0 -f Dockerfile .
    image: lot-agent-app:1.0
    restart: unless-stopped
    environment:
      <<: *app-env
      ROLE: server
      PORT: "3000"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment to reach the API directly (bypassing nginx) for debugging:
    # ports:
    #   - "3000:3000"

  worker:
    # Same image as `server` (one build, two roles via ROLE).
    image: lot-agent-app:1.0
    restart: unless-stopped
    environment:
      <<: *app-env
      ROLE: worker
    # The shared image's HEALTHCHECK probes :3000/health, which only the server
    # serves. The worker has no HTTP port, so disable it to avoid a false
    # "unhealthy" status (the process staying up is the liveness signal here).
    healthcheck:
      disable: true
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    # Image built separately from `Dockerfile.web` (see docs/deployment.md):
    #   docker build -t lot-agent-web:1.0 -f Dockerfile.web .
    image: lot-agent-web:1.0
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - server

volumes:
  pg_data:
  redis_data:
  app_data:
