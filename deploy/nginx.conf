# ─────────────────────────────────────────────────────────────
# nginx for the Lot Agent web container.
#  - Serves the React SPA from /usr/share/nginx/html (history fallback).
#  - Reverse-proxies the API and static assets to the `server` container,
#    so the browser talks to a single same-origin endpoint (no CORS).
#  - SSE-friendly: buffering off + long read timeout for the chat stream.
# The upstream host `server` is the docker-compose service name.
# ─────────────────────────────────────────────────────────────

upstream lot_server {
    server server:3000;
}

server {
    listen 80;
    server_name _;

    # Reasonable cap for user uploads (attachments). Adjust as needed.
    client_max_body_size 25m;

    # gzip text assets (not the proxied SSE stream).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    # Container-local health endpoint for HEALTHCHECK (not proxied).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Backend API (includes the SSE chat stream under /api/.../messages).
    location /api/ {
        proxy_pass http://lot_server;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Server-Sent Events: never buffer, keep the connection open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Generated/served media: assets, documents, uploads.
    location /static/ {
        proxy_pass http://lot_server;
        proxy_http_version 1.1;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Hashed Vite bundles can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history fallback — everything else returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
